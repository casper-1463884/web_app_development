{% extends "base.html" %}

{% block title %}新增食譜 - 智慧烹飪菜單系統{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card p-4">
            <h1 class="h3 mb-4">✨ 新增您的私房食譜</h1>
            <form action="{{ url_for('recipes.create') }}" method="POST">
                <div class="mb-3">
                    <label for="title" class="form-label fw-bold">食譜名稱</label>
                    <input type="text" class="form-control" id="title" name="title" placeholder="例如：義大利番茄肉醬麵" required>
                </div>
                
                <div class="mb-3">
                    <label for="description" class="form-label fw-bold">簡短說明</label>
                    <textarea class="form-control" id="description" name="description" rows="2" placeholder="簡單描述一下這道菜..."></textarea>
                </div>

                <div class="mb-4">
                    <label for="instructions" class="form-label fw-bold">料理步驟</label>
                    <textarea class="form-control" id="instructions" name="instructions" rows="6" placeholder="第一步：切碎番茄...&#10;第二步：中火炒肉..." required></textarea>
                    <div class="form-text">您可以分行輸入步驟。</div>
                </div>

                <div class="d-flex gap-2 justify-content-end">
                    <a href="{{ url_for('recipes.index') }}" class="btn btn-light px-4">取消</a>
                    <button type="submit" class="btn btn-primary px-5">儲存食譜</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
