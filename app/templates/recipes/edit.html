{% extends "base.html" %}

{% block title %}編輯食譜 - {{ recipe.title }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card p-4">
            <h1 class="h3 mb-4">✍️ 編輯食譜</h1>
            <form action="{{ url_for('recipes.update', recipe_id=recipe.id) }}" method="POST">
                <div class="mb-3">
                    <label for="title" class="form-label fw-bold">食譜名稱</label>
                    <input type="text" class="form-control" id="title" name="title" value="{{ recipe.title }}" required>
                </div>
                
                <div class="mb-3">
                    <label for="description" class="form-label fw-bold">簡短說明</label>
                    <textarea class="form-control" id="description" name="description" rows="2">{{ recipe.description }}</textarea>
                </div>

                <div class="mb-4">
                    <label for="instructions" class="form-label fw-bold">料理步驟</label>
                    <textarea class="form-control" id="instructions" name="instructions" rows="6" required>{{ recipe.instructions }}</textarea>
                </div>

                <div class="d-flex gap-2 justify-content-end">
                    <a href="{{ url_for('recipes.detail', recipe_id=recipe.id) }}" class="btn btn-light px-4">取消</a>
                    <button type="submit" class="btn btn-primary px-5">更新食譜</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
