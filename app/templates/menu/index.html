{% extends "base.html" %}

{% block title %}菜單規劃 - 智慧烹飪菜單系統{% endblock %}

{% block content %}
<div class="row mb-5">
    <div class="col-md-7">
        <h1 class="mb-2">每週菜單規劃</h1>
        <p class="text-muted">提前安排您的飲食，讓生活更有條理。</p>
    </div>
    <div class="col-md-5 text-end">
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addPlanModal">+ 加入計畫</button>
    </div>
</div>

<!-- 菜單列表 -->
<div class="row">
    <div class="col-md-12">
        <div class="card overflow-hidden">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th class="ps-4 py-3">日期</th>
                        <th class="py-3">餐次</th>
                        <th class="py-3">食譜</th>
                        <th class="text-end pe-4 py-3">操作</th>
                    </tr>
                </thead>
                <tbody>
                    {% for plan in plans %}
                    <tr>
                        <td class="ps-4 py-3 fw-bold">{{ plan.date.strftime('%m/%d (%a)') }}</td>
                        <td class="py-3">
                            <span class="badge rounded-pill bg-soft-info text-info" style="background: #e0f2fe;">{{ plan.meal_type }}</span>
                        </td>
                        <td class="py-3">
                            <a href="{{ url_for('recipes.detail', recipe_id=plan.recipe.id) }}" class="text-decoration-none text-dark fw-bold">
                                {{ plan.recipe.title }}
                            </a>
                        </td>
                        <td class="text-end pe-4 py-3">
                            <form action="{{ url_for('menu.remove', plan_id=plan.id) }}" method="POST">
                                <button type="submit" class="btn btn-link text-danger p-0">移除</button>
                            </form>
                        </td>
                    </tr>
                    {% else %}
                    <tr>
                        <td colspan="4" class="text-center py-5 text-muted">
                            本週尚未安排任何計畫。
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Add Plan Modal -->
<div class="modal fade" id="addPlanModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content border-0" style="border-radius: 20px;">
            <div class="modal-header border-0">
                <h5 class="modal-title fw-bold">新增菜單計畫</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form action="{{ url_for('menu.add') }}" method="POST">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">選擇食譜</label>
                        <select name="recipe_id" class="form-select" required>
                            <option value="">請選擇...</option>
                            {% for recipe in recipes %}
                            <option value="{{ recipe.id }}">{{ recipe.title }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">日期</label>
                        <input type="date" name="date" class="form-control" value="{{ today }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">餐次</label>
                        <select name="meal_type" class="form-select" required>
                            <option value="Breakfast">早餐</option>
                            <option value="Lunch">午餐</option>
                            <option value="Dinner">晚餐</option>
                            <option value="Snack">點心</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">取消</button>
                    <button type="submit" class="btn btn-primary px-4">確認加入</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
