{% extends "base.html" %}

{% block title %}食材庫存 - 智慧烹飪菜單系統{% endblock %}

{% block content %}
<div class="row mb-5">
    <div class="col-md-7">
        <h1 class="mb-2">我的食材庫存</h1>
        <p class="text-muted">追蹤您的冰箱與櫥櫃，減少食材浪費。</p>
    </div>
    <div class="col-md-5 text-end">
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#updatePantryModal">+ 新增/更新食材</button>
    </div>
</div>

<div class="row">
    <div class="col-md-12">
        <div class="card p-0 overflow-hidden">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th class="ps-4">食材名稱</th>
                            <th>數量</th>
                            <th>類別</th>
                            <th class="text-end pe-4">操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for item in items %}
                        <tr>
                            <td class="ps-4 fw-bold">{{ item.name }}</td>
                            <td>
                                <span class="fw-bold text-primary">{{ item.quantity }}</span> {{ item.unit }}
                            </td>
                            <td><span class="badge bg-light text-muted">{{ item.category or '未分類' }}</span></td>
                            <td class="text-end pe-4">
                                <button class="btn btn-link btn-sm text-primary p-0">編輯</button>
                            </td>
                        </tr>
                        {% else %}
                        <tr>
                            <td colspan="4" class="text-center py-5 text-muted">
                                目前沒有任何食材庫存。
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Update Pantry Modal -->
<div class="modal fade" id="updatePantryModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content border-0" style="border-radius: 20px;">
            <div class="modal-header border-0">
                <h5 class="modal-title fw-bold">更新食材庫存</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form action="{{ url_for('pantry.update') }}" method="POST">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">食材名稱</label>
                        <input type="text" name="name" class="form-control" placeholder="如：雞蛋" required>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">數量</label>
                            <input type="number" step="0.1" name="quantity" class="form-control" placeholder="0" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">單位</label>
                            <input type="text" name="unit" class="form-control" placeholder="顆/克/瓶" required>
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">取消</button>
                    <button type="submit" class="btn btn-primary px-4">更新庫存</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
